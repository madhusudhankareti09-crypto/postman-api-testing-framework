$kind: http-request
name: GetUser
url: "{{bsaeurl}}user/{{username}}"
method: GET
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200\", function () {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      let response = pm.response.json();\r

      \r

      pm.test(\"Username matches\", function () {\r

      \    pm.expect(response.username).to.eql(pm.environment.get(\"username\"));\r

      });"
    language: text/javascript
order: 1777424511781
