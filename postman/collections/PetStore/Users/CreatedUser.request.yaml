$kind: http-request
name: CreatedUser
url: https://petstore.swagger.io/v2/user
method: POST
body:
  type: json
  content: "{\r

    \  \"id\": {{id}},\r

    \  \"username\": \"{{username}}\",\r

    \  \"firstName\": \"{{firstName}}\",\r

    \  \"lastName\": \"{{lastName}}\",\r

    \  \"email\": \"{{email}}\",\r

    \  \"password\": \"{{password}}\",\r

    \  \"phone\": \"{{phone}}\",\r

    \  \"userStatus\": {{userStatus}}\r

    }"
scripts:
  - type: beforeRequest
    code: "function randomPhone() {\r

      \    return \"9\" + Math.floor(100000000 + Math.random() * 900000000);\r

      }\r

      \r

      function customPassword() {\r

      \    return \"Test@\" + Math.floor(1000 + Math.random() * 9000);\r

      }\r

      \r

      pm.environment.set(\"id\", Date.now());\r

      pm.environment.set(\"phone\", randomPhone());\r

      pm.environment.set(\"password\", customPassword());\r

      \r

      pm.environment.set(\"firstName\", pm.variables.replaceIn(\"{{$randomFirstName}}\"));\r

      pm.environment.set(\"lastName\", pm.variables.replaceIn(\"{{$randomLastName}}\"));\r

      pm.environment.set(\"username\", pm.variables.replaceIn(\"{{$randomUserName}}\"));\r

      pm.environment.set(\"email\", pm.variables.replaceIn(\"{{$randomEmail}}\"));\r

      \r

      pm.environment.set(\"userStatus\", Math.floor(Math.random() * 2));"
    language: text/javascript
order: 519135685202149
